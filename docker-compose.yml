name: correios-reverso

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: correios-reverso:local
    container_name: correios-reverso-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  testes:
    build:
      context: .
      dockerfile: Dockerfile
    image: correios-reverso:local
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "scripts/teste_completo.py", "--all", "--api-url", "http://api:8000"]
    profiles:
      - test
